<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#9c3b2e"/>
<title>FKTI かな — Kana Trainer</title>
<style>
 :root{--ink:#2b2218;--cream:#fbf7ef;--paper:#fff;--line:#e3d9c6;--accent:#9c3b2e;--sakura:#d56a7a;--muted:#8a7f6c;
  --know:#2e7d32;--kinda:#6a9a2e;--dont:#c79100;--clue:#b3402e}
 *{box-sizing:border-box}
 body{margin:0;background:var(--cream);color:var(--ink);font:16px/1.5 -apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;-webkit-tap-highlight-color:transparent}
 header{background:var(--accent);color:#fff;padding:12px 16px;box-shadow:0 2px 8px rgba(0,0,0,.15);position:sticky;top:0;z-index:5}
 header h1{margin:0;font-size:17px;font-weight:800;letter-spacing:.3px}
 header .sub{font-size:11px;opacity:.85}
 main{max-width:560px;margin:0 auto;padding:14px}
 .seg{display:flex;background:#fff;border:1px solid var(--line);border-radius:999px;overflow:hidden;margin:0 auto 12px;max-width:280px}
 .seg button{flex:1;border:none;background:none;padding:9px;font-weight:700;font-size:14px;color:var(--muted);cursor:pointer}
 .seg button.on{background:var(--accent);color:#fff}
 .bar{height:7px;background:#ece4d4;border-radius:5px;overflow:hidden;margin:2px 0 4px}
 .bar>i{display:block;height:100%;background:var(--sakura);transition:width .3s}
 .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:10px}
 .card{background:var(--paper);border:1px solid var(--line);border-radius:18px;min-height:240px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:22px;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.06);user-select:none}
 .kana{font-size:120px;line-height:1;font-weight:600}
 .flip-hint{font-size:12px;color:var(--muted);margin-top:18px}
 .romaji{font-size:40px;font-weight:800;color:var(--accent)}
 .mnem{font-size:14px;color:var(--ink);margin-top:12px;max-width:360px;line-height:1.5}
 .speak{margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 16px;font-size:14px;font-weight:700;cursor:pointer}
 .rate{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
 .rate button{border:none;border-radius:12px;padding:14px 8px;font-weight:800;font-size:14px;color:#fff;cursor:pointer}
 .r-know{background:var(--know)}.r-kinda{background:var(--kinda)}.r-dont{background:var(--dont)}.r-clue{background:var(--clue)}
 .prompt{background:#fff;border:2px solid var(--sakura);border-radius:14px;padding:16px;text-align:center;margin-top:14px}
 .prompt button{background:var(--sakura);color:#fff;border:none;border-radius:10px;padding:11px 18px;font-weight:800;cursor:pointer;margin-top:10px}
 .ghost{background:none;border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer}
 .foot{display:flex;justify-content:space-between;align-items:center;margin-top:16px}
 .hidden{display:none!important}
 .trace-wrap{position:relative;width:300px;max-width:86vw;aspect-ratio:1/1;margin:6px auto;background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;touch-action:none;box-shadow:0 6px 18px rgba(0,0,0,.06)}
 .guide-char{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:210px;color:rgba(43,34,24,.13);user-select:none;pointer-events:none}
 #traceCanvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
</style>
</head>
<body>
<header>
 <h1>FKTI かな <span style="font-weight:400;opacity:.9">· Kana Trainer</span></h1>
 <div class="sub">Five at a time · grade yourself · master a row to unlock the next</div>
</header>
<main>
 <div class="seg" id="scriptSeg">
  <button data-script="hira" class="on">ひらがな Hiragana</button>
  <button data-script="kata">カタカナ Katakana</button>
 </div>
 <div class="seg" id="modeSeg" style="max-width:260px">
  <button data-mode="recognize" class="on">👁 Recognize</button>
  <button data-mode="write">✍️ Write it</button>
 </div>
 <div class="meta"><span id="rowLabel"></span><span id="poolLabel"></span></div>
 <div class="bar"><i id="rowBar" style="width:0%"></i></div>

 <div class="card" id="card"></div>
 <div id="rateRow" class="rate hidden">
  <button class="r-know" data-rate="know">Know it</button>
  <button class="r-kinda" data-rate="kinda">Kinda know it</button>
  <button class="r-dont" data-rate="dont">Don't really</button>
  <button class="r-clue" data-rate="clue">No clue</button>
 </div>
 <div id="prompt" class="prompt hidden"></div>

 <div id="writeView" class="hidden">
  <div style="text-align:center;font-size:15px;font-weight:700;margin-bottom:6px" id="writePrompt"></div>
  <div class="trace-wrap" id="traceWrap"><div class="guide-char" id="guideChar"></div><canvas id="traceCanvas"></canvas></div>
  <div class="rate" style="grid-template-columns:1fr 1fr 1fr;margin-top:12px">
   <button class="ghost" id="traceClear">Clear</button>
   <button class="ghost" id="traceGuide">Hide guide</button>
   <button class="r-kinda" id="traceNext" style="color:#fff">Next →</button>
  </div>
  <p style="font-size:12px;color:var(--muted);text-align:center;margin-top:8px">Trace the faint character with your finger. Hide the guide to test yourself; tap 🔊 isn’t here — flip back to Recognize to hear it.</p>
 </div>

 <div class="foot">
  <button class="ghost" id="resetBtn">↻ Reset this script</button>
  <span style="font-size:11px;color:var(--muted)" id="doneTag"></span>
 </div>
</main>
<script>
// ---- kana data: rows of (up to) 5, in gojūon order. m = original text mnemonic ----
const DATA={
 hira:[
  {name:'Vowels',cells:[{k:'あ',r:'a',m:'An “A” with a flourish — say “ah”.'},{k:'い',r:'i',m:'Two reeds standing — “ee”.'},{k:'う',r:'u',m:'A person with a big nose going “oo”.'},{k:'え',r:'e',m:'An exotic, energetic bird — “eh”.'},{k:'お',r:'o',m:'Like あ with a tail — “oh!”.'}]},
  {name:'K か',cells:[{k:'か',r:'ka',m:'A katana slicing down.'},{k:'き',r:'ki',m:'It’s a “key”.'},{k:'く',r:'ku',m:'A cuckoo’s open beak “<”.'},{k:'け',r:'ke',m:'A keg on its side.'},{k:'こ',r:'ko',m:'Two short cords — “co”.'}]},
  {name:'S さ',cells:[{k:'さ',r:'sa',m:'Like き but “sah”.'},{k:'し',r:'shi',m:'A smiling hook — “she”.'},{k:'す',r:'su',m:'A swirl/screw — “soo”.'},{k:'せ',r:'se',m:'A mouth mid-“say”.'},{k:'そ',r:'so',m:'A zig-zag thread — “so”.'}]},
  {name:'T た',cells:[{k:'た',r:'ta',m:'“ta” — like a little た-ble of strokes.'},{k:'ち',r:'chi',m:'A cheery cheerleader — “chee”.'},{k:'つ',r:'tsu',m:'A wave / tsunami — “tsu”.'},{k:'て',r:'te',m:'A hand — te means “hand”!'},{k:'と',r:'to',m:'A toe with a nail.'}]},
  {name:'N な',cells:[{k:'な',r:'na',m:'A nail with a knot.'},{k:'に',r:'ni',m:'Sounds like “knee”.'},{k:'ぬ',r:'nu',m:'Twirly noodles — “noo”.'},{k:'ね',r:'ne',m:'A cat’s curly tail (neko).'},{k:'の',r:'no',m:'A big swirl — the “no” sign.'}]},
  {name:'H は',cells:[{k:'は',r:'ha',m:'“ha” — laughing strokes.'},{k:'ひ',r:'hi',m:'A wide smile — “hee”.'},{k:'ふ',r:'fu',m:'Mt Fuji’s slopes — “fu”.'},{k:'へ',r:'he',m:'A flat arrow — “heh”.'},{k:'ほ',r:'ho',m:'は plus a hat — “ho”.'}]},
  {name:'M ま',cells:[{k:'ま',r:'ma',m:'Like は; “ma-ma” ties it in a bow.'},{k:'み',r:'mi',m:'Looks like 21 — “mi”.'},{k:'む',r:'mu',m:'A cow going “moo”.'},{k:'め',r:'me',m:'An eye — me means “eye”.'},{k:'も',r:'mo',m:'A fishhook catching “mo-re”.'}]},
  {name:'Y や',cells:[{k:'や',r:'ya',m:'A yak with horns.'},{k:'ゆ',r:'yu',m:'A fish / U-boat — “yu”.'},{k:'よ',r:'yo',m:'“Yo!” — a hook on a pole.'}]},
  {name:'R ら',cells:[{k:'ら',r:'ra',m:'A rabbit mid-hop.'},{k:'り',r:'ri',m:'Two reeds — “ree”.'},{k:'る',r:'ru',m:'A loop at the end — “roo”.'},{k:'れ',r:'re',m:'Same family as ね/わ — “reh”.'},{k:'ろ',r:'ro',m:'る without the loop — “ro”.'}]},
  {name:'W わ・ん',cells:[{k:'わ',r:'wa',m:'ね/れ family — “wah”.'},{k:'を',r:'wo',m:'Object marker — said “o”.'},{k:'ん',r:'n',m:'A single soft “n”.'}]},
 ],
 kata:[
  {name:'Vowels',cells:[{k:'ア',r:'a',m:'An “A” corner — “ah”.'},{k:'イ',r:'i',m:'Two strokes leaning — “ee”.'},{k:'ウ',r:'u',m:'A roof — “oo”.'},{k:'エ',r:'e',m:'An “E” / engineer’s beam.'},{k:'オ',r:'o',m:'A check + leg — “oh”.'}]},
  {name:'K カ',cells:[{k:'カ',r:'ka',m:'A katana (like か).'},{k:'キ',r:'ki',m:'A “key” (like き).'},{k:'ク',r:'ku',m:'A cuckoo beak.'},{k:'ケ',r:'ke',m:'A keg.'},{k:'コ',r:'ko',m:'A corner — “co”.'}]},
  {name:'S サ',cells:[{k:'サ',r:'sa',m:'“sah” — like カ with a bar.'},{k:'シ',r:'shi',m:'Three strokes, smiling up — “she” (vs ツ!).'},{k:'ス',r:'su',m:'A swing — “soo”.'},{k:'セ',r:'se',m:'A mouth — “say”.'},{k:'ソ',r:'so',m:'Two strokes diving down — “so” (vs ン!).'}]},
  {name:'T タ',cells:[{k:'タ',r:'ta',m:'“ta” — like ク with a slash.'},{k:'チ',r:'chi',m:'A cheer — “chee”.'},{k:'ツ',r:'tsu',m:'Three strokes, falling — “tsu” (vs シ!).'},{k:'テ',r:'te',m:'A hand on a table.'},{k:'ト',r:'to',m:'A totem pole — “to”.'}]},
  {name:'N ナ',cells:[{k:'ナ',r:'na',m:'A nail / “na”.'},{k:'ニ',r:'ni',m:'Two lines — “knee”.'},{k:'ヌ',r:'nu',m:'Noodles crossed — “noo”.'},{k:'ネ',r:'ne',m:'A maze for a cat — “neh”.'},{k:'ノ',r:'no',m:'One slash — “no”.'}]},
  {name:'H ハ',cells:[{k:'ハ',r:'ha',m:'Two strokes laughing — “ha”.'},{k:'ヒ',r:'hi',m:'A heel — “hee”.'},{k:'フ',r:'fu',m:'One Fuji slope — “fu”.'},{k:'ヘ',r:'he',m:'Same as hiragana へ — “heh”.'},{k:'ホ',r:'ho',m:'A cross with sparks — “ho”.'}]},
  {name:'M マ',cells:[{k:'マ',r:'ma',m:'A check + tail — “ma”.'},{k:'ミ',r:'mi',m:'Three lines — “mi” (=3).'},{k:'ム',r:'mu',m:'A cow’s “moo”.'},{k:'メ',r:'me',m:'An “X” / crossed eyes — “me”.'},{k:'モ',r:'mo',m:'A hook + bars — “mo”.'}]},
  {name:'Y ヤ',cells:[{k:'ヤ',r:'ya',m:'A yak — “ya”.'},{k:'ユ',r:'yu',m:'A “U” tray — “yu”.'},{k:'ヨ',r:'yo',m:'An E-comb — “yo!”.'}]},
  {name:'R ラ',cells:[{k:'ラ',r:'ra',m:'A roof + bar — “ra”.'},{k:'リ',r:'ri',m:'Two strokes (like り) — “ree”.'},{k:'ル',r:'ru',m:'A loop legs — “roo”.'},{k:'レ',r:'re',m:'An “L” hook — “reh”.'},{k:'ロ',r:'ro',m:'A box — “ro”.'}]},
  {name:'W ワ・ン',cells:[{k:'ワ',r:'wa',m:'An open box — “wah”.'},{k:'ヲ',r:'wo',m:'Rare object marker — “o”.'},{k:'ン',r:'n',m:'Two strokes rising — “n” (vs ソ!).'}]},
 ],
};
const RATE_VAL={know:3,kinda:2,dont:1,clue:0};
let script='hira', cur=null, flipped=false, lastKey=null, seqPtr=0;

const $=id=>document.getElementById(id);
function store(){return JSON.parse(localStorage.getItem('fkti_kana')||'{}');}
function save(s){localStorage.setItem('fkti_kana',JSON.stringify(s));}
function prog(){const s=store();s[script]=s[script]||{rows:1,cards:{}};return s[script];}
function setProg(p){const s=store();s[script]=p;save(s);}

function rows(){return DATA[script];}
function activeCells(){const p=prog();return rows().slice(0,p.rows).flatMap(r=>r.cells);}
function frontier(){const p=prog();return rows()[p.rows-1];}
function cardState(k){const p=prog();return p.cards[k]||{lvl:0,streak:0,seen:0};}
function mastered(k){const c=cardState(k);return c.lvl===3&&c.streak>=2;}
function frontierDone(){return frontier().cells.every(c=>mastered(c.k));}

function speak(t){try{const u=new SpeechSynthesisUtterance(t);u.lang='ja-JP';u.rate=0.8;const v=(speechSynthesis.getVoices()||[]).find(x=>(x.lang||'').toLowerCase().startsWith('ja'));if(v)u.voice=v;speechSynthesis.cancel();speechSynthesis.speak(u);}catch(_){}}

function pick(){
 const pool=activeCells(); const fr=frontier().cells;
 // 35% of the time, drill the newest row in order; else weighted-random across everything learned
 if(Math.random()<0.35 && !frontierDone()){ const c=fr[seqPtr%fr.length]; seqPtr++; if(c.k!==lastKey||fr.length===1) return c; }
 const weighted=[];
 for(const c of pool){const st=cardState(c.k);const w=1+(3-st.lvl)*2+(st.streak<2?1:0)+(st.seen===0?3:0);for(let i=0;i<w;i++)weighted.push(c);}
 let c, tries=0; do{c=weighted[Math.floor(Math.random()*weighted.length)];tries++;}while(pool.length>1&&c.k===lastKey&&tries<8);
 return c;
}
function render(){
 if(mode==='write'){renderWrite();return;}
 $('writeView').classList.add('hidden'); $('card').classList.remove('hidden');
 // script seg + labels
 $('rowLabel').textContent='Row: '+frontier().name;
 const fr=frontier().cells, done=fr.filter(c=>mastered(c.k)).length;
 $('rowBar').style.width=Math.round(done/fr.length*100)+'%';
 $('poolLabel').textContent=activeCells().length+' kana in play';
 const totalRows=rows().length, p=prog();
 $('doneTag').textContent=(p.rows>=totalRows&&frontierDone())?'All '+activeCells().length+' learned! 🎉':'Row '+p.rows+' / '+totalRows;
 // prompt to advance?
 if(frontierDone() && p.rows<totalRows){
  $('prompt').classList.remove('hidden'); $('rateRow').classList.add('hidden'); $('card').classList.add('hidden');
  const next=rows()[p.rows];
  $('prompt').innerHTML='🎉 You’ve got the <b>'+frontier().name+'</b> row!<br>Ready to add the <b>'+next.name+'</b> row?<br><button id="addRow">Add the '+next.name+' row →</button> <button class="ghost" id="keepGoing" style="margin-top:10px">Keep reviewing</button>';
  $('addRow').onclick=()=>{const pp=prog();pp.rows++;setProg(pp);seqPtr=0;$('prompt').classList.add('hidden');$('card').classList.remove('hidden');next_();};
  $('keepGoing').onclick=()=>{$('prompt').classList.add('hidden');$('card').classList.remove('hidden');next_();};
  return;
 }
 $('prompt').classList.add('hidden'); $('card').classList.remove('hidden');
 showCard();
}
function showCard(){
 if(!cur) cur=pick();
 if(!flipped){
  $('card').innerHTML='<div class="kana">'+cur.k+'</div><div class="flip-hint">tap to flip</div>';
  $('rateRow').classList.add('hidden');
 }else{
  $('card').innerHTML='<div class="romaji">'+cur.r+'</div><div class="mnem">'+cur.m+'</div><button class="speak" id="speakBtn">🔊 hear it</button>';
  $('speakBtn').onclick=e=>{e.stopPropagation();speak(cur.k);};
  $('rateRow').classList.remove('hidden');
 }
}
function next_(){cur=pick();flipped=false;showCard();}
function rate(b){
 const p=prog(); const c=p.cards[cur.k]||{lvl:0,streak:0,seen:0};
 c.lvl=RATE_VAL[b]; c.streak=(b==='know')?c.streak+1:0; c.seen++;
 p.cards[cur.k]=c; setProg(p);
 lastKey=cur.k; cur=null; flipped=false;
 render();
}
// wiring
$('card').onclick=()=>{ if($('prompt').classList.contains('hidden')){ flipped=!flipped; showCard(); } };
document.querySelectorAll('[data-rate]').forEach(b=>b.onclick=()=>rate(b.dataset.rate));
document.querySelectorAll('#scriptSeg button').forEach(b=>b.onclick=()=>{
 script=b.dataset.script; document.querySelectorAll('#scriptSeg button').forEach(x=>x.classList.toggle('on',x===b));
 cur=null;flipped=false;seqPtr=0;lastKey=null;render();
});
$('resetBtn').onclick=()=>{ if(confirm('Reset progress for '+(script==='hira'?'Hiragana':'Katakana')+'?')){ const s=store(); delete s[script]; save(s); cur=null;flipped=false;seqPtr=0;render(); } };
// ---- ✍️ write-it (finger tracing) ----
let mode='recognize', wIdx=0, guideOn=true, tctx=null, drawing=false;
function renderWrite(){
 $('card').classList.add('hidden'); $('rateRow').classList.add('hidden'); $('prompt').classList.add('hidden');
 $('writeView').classList.remove('hidden');
 const pool=activeCells(); if(!pool.length)return;
 wIdx=((wIdx%pool.length)+pool.length)%pool.length; const c=pool[wIdx];
 $('writePrompt').textContent='Write:  “'+c.r+'”';
 $('guideChar').textContent=c.k; $('guideChar').style.display=guideOn?'flex':'none';
 $('rowLabel').textContent='Writing · '+frontier().name;
 $('poolLabel').textContent=pool.length+' kana to practice';
 $('doneTag').textContent=(wIdx+1)+' / '+pool.length;
 setupCanvas();
}
function setupCanvas(){const cv=$('traceCanvas');const r=cv.getBoundingClientRect();if(!r.width)return;cv.width=r.width;cv.height=r.height;tctx=cv.getContext('2d');tctx.lineWidth=11;tctx.lineCap='round';tctx.lineJoin='round';tctx.strokeStyle='#9c3b2e';}
function clearTrace(){const cv=$('traceCanvas');if(tctx)tctx.clearRect(0,0,cv.width,cv.height);}
function tpos(e){const cv=$('traceCanvas');const r=cv.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}
function bindCanvas(){const cv=$('traceCanvas');
 cv.addEventListener('pointerdown',e=>{e.preventDefault();if(!tctx)setupCanvas();drawing=true;const p=tpos(e);tctx.beginPath();tctx.moveTo(p.x,p.y);try{cv.setPointerCapture(e.pointerId);}catch(_){}});
 cv.addEventListener('pointermove',e=>{if(!drawing)return;e.preventDefault();const p=tpos(e);tctx.lineTo(p.x,p.y);tctx.stroke();});
 cv.addEventListener('pointerup',()=>{drawing=false;});
 cv.addEventListener('pointercancel',()=>{drawing=false;});
}
document.querySelectorAll('#modeSeg button').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;document.querySelectorAll('#modeSeg button').forEach(x=>x.classList.toggle('on',x===b));wIdx=0;cur=null;flipped=false;render();});
$('traceClear').onclick=clearTrace;
$('traceGuide').onclick=()=>{guideOn=!guideOn;$('guideChar').style.display=guideOn?'flex':'none';$('traceGuide').textContent=guideOn?'Hide guide':'Show guide';};
$('traceNext').onclick=()=>{wIdx++;renderWrite();};
window.addEventListener('resize',()=>{if(mode==='write')setupCanvas();});
// voices load async on some browsers
if(window.speechSynthesis) speechSynthesis.onvoiceschanged=()=>{};
bindCanvas();
render();
</script>
</body>
</html>
